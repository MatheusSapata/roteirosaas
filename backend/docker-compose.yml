version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: bdroteiro
      POSTGRES_PASSWORD: bdroteiro
      POSTGRES_DB: bdroteiro
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdroteiro -d bdroteiro"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - appnet

  evolution-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - appnet

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://bdroteiro:bdroteiro@db:5432/bdroteiro
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution-api:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      EVOLUTION_SERVER_URL: ${EVOLUTION_SERVER_URL}
      EVOLUTION_WEBHOOK_URL: ${EVOLUTION_WEBHOOK_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_healthy
    networks:
      - appnet

  pgadmin:
    image: dpage/pgadmin4:8.11
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin:/var/lib/pgadmin
    networks:
      - appnet

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data
    networks:
      - appnet

  evolution-api:
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-api:v2.3.6}
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      evolution-db:
        condition: service_healthy
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${EVOLUTION_SERVER_URL}
      LOG_LEVEL: ${EVOLUTION_LOG_LEVEL:-ERROR,WARN,INFO,WEBHOOKS}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL:-postgresql://evolution:evolution@evolution-db:5432/evolution}
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: ${REDIS_URL:-redis://redis:6379/0}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: "false"
      WEBHOOK_EVENTS_GROUPS_UPSERT: "false"
      WEBHOOK_EVENTS_GROUPS_UPDATE: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - appnet

volumes:
  pgdata: {}
  pgadmin: {}
  redisdata: {}
  evolution_pgdata: {}
  evolution_instances: {}
  evolution_store: {}

networks:
  appnet:
    driver: bridge
