version: "3.9"

services:
  api-public:
    build: .
    container_name: api-public
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always
    volumes:
      - ./:/app
      - /var/www/roteiro-public:/app/frontend/dist:ro
    env_file:
      - .env.public
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution-api:8080}
      APP_RUNTIME_MODE: public
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - appnet

networks:
  appnet:
    external: true
    name: roteiro_appnet
